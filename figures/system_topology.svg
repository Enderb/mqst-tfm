<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ZCU216 QICK system topology</title>
<desc>Signal flow from the tProcessor inside the ZCU216 RFSoC through the XM655 analogue front-end to the qubit chip, showing the readout drive path, qubit drive path, and readout return path.</desc>
<defs>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th  { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }
    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th    { fill: #085041; }
    .c-teal .ts    { fill: #0F6E56; }
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th   { fill: #633806; }
    .c-amber .ts   { fill: #854F0B; }
    .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th    { fill: #0C447C; }
    .c-blue .ts    { fill: #185FA5; }
  </style>
</defs>

<!-- ZCU216 container -->
<rect x="18" y="28" width="262" height="390" rx="14" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="6 3" opacity="0.6"/>
<text class="th" x="149" y="50" text-anchor="middle">ZCU216 RFSoC</text>

<!-- tProcessor -->
<g class="c-purple">
  <rect x="36" y="64" width="100" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="86" y="85" text-anchor="middle" dominant-baseline="central">tProcessor V2</text>
  <text class="ts" x="86" y="103" text-anchor="middle" dominant-baseline="central">Pulse sequencing</text>
</g>

<!-- Signal gen 6 (readout) -->
<g class="c-teal">
  <rect x="152" y="64" width="112" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="208" y="85" text-anchor="middle" dominant-baseline="central">Signal gen 6</text>
  <text class="ts" x="208" y="103" text-anchor="middle" dominant-baseline="central">Readout, DAC 2_231</text>
</g>

<!-- Signal gen N (qubit drive) -->
<g class="c-teal">
  <rect x="152" y="180" width="112" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="208" y="201" text-anchor="middle" dominant-baseline="central">Signal gen N</text>
  <text class="ts" x="208" y="219" text-anchor="middle" dominant-baseline="central">Qubit drive, &#x3C0; pulse</text>
</g>

<!-- tProc to sig gen 6 -->
<line x1="137" y1="90" x2="151" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arr-gray)"/>
<!-- tProc to sig gen N (L-bend) -->
<path d="M136 90 L144 90 L144 206 L151 206" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arr-gray)" opacity="0.7"/>

<!-- Readout block -->
<g class="c-teal">
  <rect x="152" y="348" width="112" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="208" y="369" text-anchor="middle" dominant-baseline="central">Readout ch. 0</text>
  <text class="ts" x="208" y="387" text-anchor="middle" dominant-baseline="central">ADC 0_226</text>
</g>

<!-- IQ output -->
<g class="c-purple">
  <rect x="36" y="348" width="100" height="52" rx="6" stroke-width="0.5"/>
  <text class="th" x="86" y="369" text-anchor="middle" dominant-baseline="central">IQ output</text>
  <text class="ts" x="86" y="387" text-anchor="middle" dominant-baseline="central">Decimated / accum.</text>
</g>

<!-- Readout ch to IQ output (blue) -->
<line x1="151" y1="374" x2="137" y2="374" stroke="#378ADD" stroke-width="2" marker-end="url(#arr-blue)"/>

<!-- XM655 container -->
<rect x="318" y="50" width="118" height="360" rx="12" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
<text class="th" x="377" y="70" text-anchor="middle">XM655</text>

<!-- BALUN RO TX -->
<g class="c-amber">
  <rect x="330" y="80" width="94" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="377" y="98" text-anchor="middle" dominant-baseline="central">BALUN (RO TX)</text>
  <text class="ts" x="377" y="114" text-anchor="middle" dominant-baseline="central">Diff. &#x2192; single-ended</text>
</g>

<!-- BALUN DR TX -->
<g class="c-amber">
  <rect x="330" y="183" width="94" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="377" y="201" text-anchor="middle" dominant-baseline="central">BALUN (DR TX)</text>
  <text class="ts" x="377" y="217" text-anchor="middle" dominant-baseline="central">Diff. &#x2192; single-ended</text>
</g>

<!-- BALUN RX -->
<g class="c-amber">
  <rect x="330" y="340" width="94" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="377" y="358" text-anchor="middle" dominant-baseline="central">BALUN (RX)</text>
  <text class="ts" x="377" y="374" text-anchor="middle" dominant-baseline="central">Single-ended &#x2192; diff.</text>
</g>

<!-- Loopback note -->
<rect x="328" y="268" width="98" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.4"/>
<text class="ts" x="377" y="283" text-anchor="middle" opacity="0.65">Loopback (cal.):</text>
<text class="ts" x="377" y="298" text-anchor="middle" opacity="0.65">TX &#x2192; SMA &#x2192; RX</text>

<!-- Sig gen 6 to BALUN RO TX (green) -->
<line x1="265" y1="103" x2="329" y2="103" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr-green)"/>
<!-- Sig gen N to BALUN DR TX (amber) -->
<line x1="265" y1="206" x2="329" y2="206" stroke="#BA7517" stroke-width="2" marker-end="url(#arr-amber)"/>
<!-- BALUN RX to readout ch (blue) -->
<line x1="329" y1="363" x2="265" y2="363" stroke="#378ADD" stroke-width="2" marker-end="url(#arr-blue)"/>

<!-- Qubit chip container -->
<rect x="474" y="50" width="144" height="360" rx="12" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" opacity="0.35"/>
<text class="th" x="546" y="70" text-anchor="middle">Qubit chip</text>
<text class="ts" x="546" y="86" text-anchor="middle" opacity="0.65">(future)</text>

<!-- Resonator -->
<g class="c-blue">
  <rect x="490" y="96" width="112" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="546" y="114" text-anchor="middle" dominant-baseline="central">Resonator</text>
  <text class="ts" x="546" y="130" text-anchor="middle" dominant-baseline="central">Dispersive readout</text>
</g>

<!-- Qubit -->
<g class="c-blue">
  <rect x="490" y="220" width="112" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="546" y="238" text-anchor="middle" dominant-baseline="central">Qubit</text>
  <text class="ts" x="546" y="254" text-anchor="middle" dominant-baseline="central">Fluxonium / transmon</text>
</g>

<!-- Resonator to Qubit coupling -->
<line x1="546" y1="142" x2="546" y2="220" stroke="#888780" stroke-width="1" stroke-dasharray="3 2" opacity="0.5" marker-end="url(#arr-gray)"/>
<text class="ts" x="560" y="185" opacity="0.65">g</text>

<!-- BALUN RO TX to resonator (green) -->
<line x1="425" y1="103" x2="489" y2="103" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr-green)"/>
<!-- BALUN DR TX to qubit (amber) -->
<line x1="425" y1="206" x2="489" y2="237" stroke="#BA7517" stroke-width="2" marker-end="url(#arr-amber)"/>
<!-- Resonator to BALUN RX (blue dashed, route around right edge) -->
<path d="M602 119 L648 119 L648 363 L425 363" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr-blue)"/>

<!-- Legend -->
<line x1="36"  y1="440" x2="62"  y2="440" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr-green)"/>
<text class="ts" x="68" y="444">Readout drive</text>
<line x1="178" y1="440" x2="204" y2="440" stroke="#BA7517" stroke-width="2" marker-end="url(#arr-amber)"/>
<text class="ts" x="210" y="444">Qubit drive</text>
<line x1="310" y1="440" x2="336" y2="440" stroke="#378ADD" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr-blue)"/>
<text class="ts" x="342" y="444">Readout return</text>
<line x1="476" y1="440" x2="502" y2="440" stroke="#888780" stroke-width="1" stroke-dasharray="3 2" opacity="0.6" marker-end="url(#arr-gray)"/>
<text class="ts" x="508" y="444" opacity="0.7">Dispersive coupling</text>

</svg>
